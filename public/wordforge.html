<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>WordForge</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg1:#0a0e27;--bg2:#1a1f3a;--bg3:#252b4a;
--coral:#ff6b6b;--pink:#ff8fa3;--gold:#ffd700;--green:#4ecdc4;--green2:#2ecc71;
--purple:#a855f7;--purple2:#7c3aed;--amber:#f59e0b;--amber2:#d97706;
--text:#e8e8f0;--text2:#9ca3af;--white:#fff;
--tile-w:42px;--tile-h:52px;
}
html{background:var(--bg1);touch-action:manipulation}
body{
font-family:'Fredoka',sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;
}
.container{max-width:420px;margin:0 auto;padding:0 10px;position:relative;min-height:100dvh}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}

/* MENU */
#menu{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:20px}
.menu-title{
font-size:3.2rem;font-weight:700;
background:linear-gradient(135deg,var(--coral),var(--gold),var(--green));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;letter-spacing:-1px;margin-bottom:4px;
animation:titlePulse 3s ease-in-out infinite;
}
@keyframes titlePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}
.menu-sub{color:var(--text2);font-size:.95rem;margin-bottom:28px;font-weight:400}
.menu-tiles{display:flex;gap:8px;margin-bottom:36px}
.menu-tile{
width:52px;height:62px;border-radius:10px;display:flex;align-items:center;justify-content:center;
font-size:1.6rem;font-weight:700;color:var(--white);
animation:tileFloat 2s ease-in-out infinite;
}
.menu-tile:nth-child(1){background:linear-gradient(135deg,var(--coral),#e05555);animation-delay:0s}
.menu-tile:nth-child(2){background:linear-gradient(135deg,var(--gold),#e6c200);animation-delay:.15s}
.menu-tile:nth-child(3){background:linear-gradient(135deg,var(--green),#3ab3a5);animation-delay:.3s}
.menu-tile:nth-child(4){background:linear-gradient(135deg,var(--purple),var(--purple2));animation-delay:.45s}
@keyframes tileFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.btn-play{
background:linear-gradient(135deg,var(--green),var(--green2));color:var(--white);
font-size:1.25rem;font-weight:600;padding:14px 56px;border-radius:14px;
box-shadow:0 4px 20px rgba(78,205,196,.35);transition:transform .15s,box-shadow .15s;
}
.btn-play:active{transform:scale(.96);box-shadow:0 2px 10px rgba(78,205,196,.25)}
.menu-how{margin-top:20px;color:var(--text2);font-size:.82rem;max-width:300px;line-height:1.5}

/* GAME SCREEN */
#game{padding-bottom:130px}
.header{
display:flex;justify-content:space-between;align-items:center;
padding:10px 0 6px;font-size:.82rem;
}
.header-left{display:flex;flex-direction:column;gap:2px}
.ante-label{font-weight:600;color:var(--gold);font-size:.9rem}
.blind-label{color:var(--pink);font-weight:500;font-size:.78rem}
.money{color:var(--gold);font-weight:700;font-size:1.1rem}

.score-bar{
background:var(--bg3);border-radius:10px;height:28px;position:relative;overflow:hidden;margin-bottom:8px;
}
.score-fill{
height:100%;border-radius:10px;transition:width .4s ease;
background:linear-gradient(90deg,var(--green),var(--green2));min-width:2px;
}
.score-text{
position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
font-size:.78rem;font-weight:600;color:var(--white);text-shadow:0 1px 3px rgba(0,0,0,.5);
}

.stats-row{display:flex;gap:12px;margin-bottom:8px;font-size:.78rem}
.stat{
background:var(--bg3);border-radius:8px;padding:4px 10px;display:flex;align-items:center;gap:4px;
}
.stat-icon{font-size:.9rem}
.stat-val{font-weight:600;color:var(--white)}

.section-label{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:6px 0 4px;font-weight:500}

.challenger-box{
background:linear-gradient(135deg,rgba(255,107,107,.12),rgba(255,107,107,.05));
border:1px solid rgba(255,107,107,.25);border-radius:10px;padding:8px;margin-bottom:6px;
min-height:44px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.challenger-box .section-label{margin:0;width:100%}

.joker-row{display:flex;gap:5px;margin-bottom:6px;overflow-x:auto;padding:2px 0;min-height:36px}
.joker-chip{
background:linear-gradient(135deg,var(--purple),var(--purple2));
border-radius:8px;padding:3px 8px;font-size:.65rem;font-weight:600;
color:var(--white);white-space:nowrap;flex-shrink:0;
}

.word-preview{
background:var(--bg3);border-radius:12px;padding:10px 8px 6px;margin-bottom:4px;
min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
}
.word-letters{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;min-height:36px;align-items:center}
.word-letter{
font-size:1.3rem;font-weight:700;min-width:28px;text-align:center;
}
.word-letter.challenger{color:var(--coral)}
.word-letter.hand{color:var(--white)}
.word-status{font-size:.72rem;font-weight:600;padding:2px 10px;border-radius:6px;display:inline-block}
.word-status.valid{background:rgba(255,215,0,.18);color:var(--gold)}
.word-status.invalid{background:rgba(156,163,175,.12);color:var(--text2)}
.word-empty{color:var(--text2);font-size:.82rem;font-style:italic}

.hand-area{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:8px 0 6px;min-height:56px}

.tile{
width:var(--tile-w);height:var(--tile-h);border-radius:8px;
display:flex;flex-direction:column;align-items:center;justify-content:center;
position:relative;transition:transform .15s,box-shadow .15s;
user-select:none;cursor:pointer;
}
.tile .letter{font-size:1.15rem;font-weight:700;line-height:1}
.tile .points{position:absolute;bottom:3px;right:5px;font-size:.55rem;font-weight:600;opacity:.7}

.tile-hand{
background:linear-gradient(145deg,#c8ccd8,#a8adb8);color:#1a1f3a;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.tile-hand.selected{
background:linear-gradient(145deg,var(--pink),var(--coral));color:var(--white);
transform:translateY(-5px);box-shadow:0 4px 12px rgba(255,107,107,.35);
}
.tile-challenger{
background:linear-gradient(145deg,#e05555,#cc4444);color:var(--white);
box-shadow:0 2px 6px rgba(255,107,107,.25);
}
.tile-challenger.selected{
transform:translateY(-5px);
border:2px solid var(--gold);box-shadow:0 4px 14px rgba(255,215,0,.35);
}

.actions{
position:fixed;bottom:0;left:0;right:0;
background:linear-gradient(0deg,var(--bg1) 70%,transparent);
padding:8px 10px calc(10px + env(safe-area-inset-bottom));
display:flex;flex-direction:column;align-items:center;gap:6px;z-index:100;
}
.actions .stats-row{display:flex;gap:12px;font-size:.78rem;justify-content:center}
.actions .btn-row{display:flex;gap:10px;width:100%;justify-content:center}
.actions .btn-row button{
flex:1;max-width:190px;padding:12px 0;border-radius:12px;font-size:1rem;font-weight:600;
color:var(--white);transition:transform .12s,opacity .12s;
}
.actions .btn-row button:active{transform:scale(.95)}
.actions .btn-row button:disabled{opacity:.4;pointer-events:none}
.btn-submit{background:linear-gradient(135deg,var(--green),var(--green2));box-shadow:0 3px 12px rgba(78,205,196,.3)}
.btn-discard{background:linear-gradient(135deg,var(--amber),var(--amber2));box-shadow:0 3px 12px rgba(245,158,11,.3)}

.last-score{text-align:center;font-size:.75rem;color:var(--text2);margin-top:2px}
.last-score span{color:var(--gold);font-weight:600}

.chall-bar{
background:var(--bg3);border-radius:10px;height:24px;position:relative;overflow:hidden;margin-bottom:6px;
}
.chall-fill{
height:100%;border-radius:10px;transition:width .4s ease;
background:linear-gradient(90deg,var(--coral),#e05555);min-width:2px;
}
.chall-text{
position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
font-size:.72rem;font-weight:600;color:var(--white);text-shadow:0 1px 3px rgba(0,0,0,.5);
}

.play-log{margin-top:8px;padding-bottom:4px}
.play-log-title{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:500}
.log-entry{
display:flex;justify-content:space-between;align-items:center;
padding:4px 8px;border-radius:6px;margin-bottom:3px;
background:rgba(255,255,255,.03);font-size:.75rem;
}
.log-word{font-weight:600;color:var(--white);letter-spacing:.5px}
.log-word .log-chall{color:var(--coral)}
.log-detail{color:var(--text2);font-size:.68rem}
.log-score{color:var(--gold);font-weight:600}
.log-badge{
display:inline-block;font-size:.6rem;font-weight:600;padding:1px 5px;border-radius:4px;margin-left:4px;
}
.log-badge.word{background:rgba(255,215,0,.18);color:var(--gold)}
.log-badge.noword{background:rgba(156,163,175,.1);color:var(--text2)}

/* SHOP */
#shop{padding:12px 0 30px}
.shop-header{text-align:center;margin-bottom:14px}
.shop-title{font-size:1.5rem;font-weight:700;color:var(--gold);margin-bottom:2px}
.shop-money{font-size:1.1rem;color:var(--gold);font-weight:600}
.shop-next{font-size:.78rem;color:var(--text2);margin-top:4px}
.shop-section{margin-bottom:16px}
.shop-section-title{font-size:.82rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:500}
.shop-jokers{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
.shop-joker{
background:var(--bg3);border:1px solid rgba(168,85,247,.3);border-radius:10px;
padding:8px;min-width:130px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;
}
.shop-joker-name{font-size:.82rem;font-weight:600;color:var(--purple)}
.shop-joker-desc{font-size:.68rem;color:var(--text2);line-height:1.3}
.shop-joker-cost{font-size:.78rem;color:var(--gold);font-weight:600;margin-top:auto}
.shop-joker button{
background:linear-gradient(135deg,var(--purple),var(--purple2));color:var(--white);
border-radius:8px;padding:5px 0;font-size:.75rem;font-weight:600;margin-top:4px;width:100%;
}
.shop-joker button:disabled{opacity:.4}
.shop-letters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.shop-letter-card{
background:var(--bg3);border-radius:10px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:4px;
min-width:68px;
}
.shop-letter-card .cost{font-size:.75rem;color:var(--gold);font-weight:600}
.shop-letter-card button{
background:linear-gradient(135deg,var(--green),var(--green2));color:var(--white);
border-radius:7px;padding:4px 12px;font-size:.72rem;font-weight:600;
}
.shop-letter-card button:disabled{opacity:.4}
.owned-jokers{display:flex;gap:5px;flex-wrap:wrap}
.btn-next-round{
display:block;margin:16px auto 0;background:linear-gradient(135deg,var(--green),var(--green2));
color:var(--white);padding:12px 40px;border-radius:12px;font-size:1rem;font-weight:600;
box-shadow:0 3px 12px rgba(78,205,196,.3);
}
.btn-next-round:active{transform:scale(.96)}

/* END SCREENS */
#gameover,#win{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:20px}
.end-title{font-size:2rem;font-weight:700;margin-bottom:8px}
.end-sub{color:var(--text2);font-size:.9rem;margin-bottom:6px;line-height:1.5}
.end-stat{color:var(--gold);font-weight:600;font-size:1.1rem;margin-bottom:20px}
.btn-retry{
background:linear-gradient(135deg,var(--coral),#e05555);color:var(--white);
padding:12px 44px;border-radius:12px;font-size:1rem;font-weight:600;
}

/* TOAST */
.toast{
position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
background:var(--bg3);border:1px solid rgba(255,255,255,.1);color:var(--white);
padding:8px 18px;border-radius:10px;font-size:.78rem;font-weight:500;
z-index:200;pointer-events:none;opacity:0;transition:opacity .3s;
text-align:center;max-width:340px;box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.toast.show{opacity:1}

/* PREGAME / DECK VIEWER */
#pregame{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:20px}
.pregame-title{font-size:1.5rem;font-weight:700;color:var(--gold);margin-bottom:4px}
.pregame-sub{font-size:.85rem;color:var(--text2);margin-bottom:16px}
.deck-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:360px;margin-bottom:20px}
.deck-summary{font-size:.78rem;color:var(--text2);margin-bottom:12px}
.deck-toggle{
  background:var(--bg3);border:1px solid rgba(255,255,255,.1);color:var(--text);
  padding:6px 16px;border-radius:8px;font-size:.78rem;font-weight:500;margin-bottom:12px;
  cursor:pointer;
}
.deck-toggle:active{opacity:.7}
</style>
</head>

// === LETTER DISTRIBUTION ===
const LETTER_VALS={A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10};
const FREQ='EEEEEEEEEEEEAAAAAAAAAIIIIIIIIIOOOOOOOONNNNNNRRRRRRTTTTTTLLLLSSSSUUUUDDDDGGGBBCCMMPPFFHHVVWWYYKJXQZ';

// === JOKER DEFS ===
const ALL_JOKERS=[
{id:'wordsmith',name:'Wordsmith',desc:'+20 pts for 5+ letter plays',cost:4},
{id:'vowelmaster',name:'Vowel Master',desc:'x1.5 mult per vowel',cost:5},
{id:'consonantking',name:'Consonant King',desc:'+5 pts per consonant',cost:4},
{id:'lucky7',name:'Lucky 7',desc:'x3 mult for exactly 7-letter plays',cost:6},
{id:'scrabblefiend',name:'Scrabble Fiend',desc:'+10 pts per tile worth 4+',cost:5},
{id:'minimalist',name:'Minimalist',desc:'x2 mult for exactly 3-letter plays',cost:3},
{id:'chainletter',name:'Chain Letter',desc:'+15 pts per hand played this round',cost:4},
{id:'inkwell',name:'Inkwell',desc:'+3 flat mult',cost:3},
{id:'thesaurus',name:'Thesaurus',desc:'+30 pts for 6+ letter plays',cost:5},
{id:'doubledown',name:'Double Down',desc:'x2 mult if any letter repeats',cost:4},
];

// === STATE ===
let S={};

function initState(){
S={
screen:'menu',round:1,money:4,
deck:[],hand:[],handSelected:[],
challengers:[],challSelected:[],challUsed:[],
selectionOrder:[], // tracks tap order: [{type:'c'|'h', idx:number}, ...]
jokers:[],handsLeft:4,discardsLeft:3,
score:0,target:0,handsPlayed:0,playLog:[],
shopJokers:[],shopLetters:[]
};
}

// === UTILS ===
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pick(a,n){return shuffle([...a]).slice(0,n)}
function rand(a,b){return a+Math.floor(Math.random()*(b-a+1))}

function buildDeck(){
const pool=[...FREQ];
S.deck=shuffle(pick(pool,30));
}

function getTarget(round){
return Math.floor((30 + (round-1)*20) * (1 + (round-1)*0.18));
}

function challengerCount(round){
return round;
}

function genChallengers(n){
const pool='RSTLNEDAIO';
const out=[];
for(let i=0;i<n;i++) out.push(pool[Math.floor(Math.random()*pool.length)]);
return out;
}

function drawHand(){
const pool=[...S.deck];
shuffle(pool);
S.hand=pool.slice(0,8);
S.handSelected=new Array(8).fill(false);
}

// === SCORING ===
function calcScore(letters,sources){
const vowels=new Set('AEIOU');
const hasChall=sources&&sources.some(s=>s==='c');
let pts=0;
const word=letters.join('').toLowerCase();
const isWord=letters.length>=2&&DICT.has(word);
letters.forEach((l,i)=>{
  const base=LETTER_VALS[l]||0;
  let val=(sources&&sources[i]==='c')?base*2:base;
  if(!isWord&&!hasChall) val=Math.max(1,Math.floor(val/2));
  pts+=val;
});
let mult=1;
if(isWord) mult*=2;

// Jokers
const jIds=S.jokers.map(j=>j.id);
if(jIds.includes('wordsmith')&&letters.length>=5) pts+=20;
if(jIds.includes('vowelmaster')){
  const vc=letters.filter(l=>vowels.has(l)).length;
  if(vc>0) mult*=Math.pow(1.5,vc);
}
if(jIds.includes('consonantking')){
  const cc=letters.filter(l=>!vowels.has(l)).length;
  pts+=cc*5;
}
if(jIds.includes('lucky7')&&letters.length===7) mult*=3;
if(jIds.includes('scrabblefiend')){
  letters.forEach(l=>{if((LETTER_VALS[l]||0)>=4) pts+=10});
}
if(jIds.includes('minimalist')&&letters.length===3) mult*=2;
if(jIds.includes('chainletter')) pts+=S.handsPlayed*15;
if(jIds.includes('inkwell')) mult+=3;
if(jIds.includes('thesaurus')&&letters.length>=6) pts+=30;
if(jIds.includes('doubledown')){
  const seen={};
  let hasDouble=false;
  letters.forEach(l=>{seen[l]=(seen[l]||0)+1;if(seen[l]>=2)hasDouble=true});
  if(hasDouble) mult*=2;
}

return{pts,mult:Math.round(mult*100)/100,total:Math.floor(pts*mult),isWord};
}

// === TOAST ===
let toastTimer;
function toast(msg,dur=2200){
const el=document.getElementById('toast');
el.textContent=msg;
el.classList.add('show');
clearTimeout(toastTimer);
toastTimer=setTimeout(()=>el.classList.remove('show'),dur);
}

// === SCREENS ===
function showScreen(id){
['menu','game','pregame','shop','gameover','win'].forEach(s=>{
  document.getElementById(s).classList.toggle('hidden',s!==id);
});
S.screen=id;
}

// === RENDER GAME ===
function renderGame(){
const g=document.getElementById('game');
const pct=Math.min(100,Math.round(S.score/S.target*100));

// Build selected letters for preview in tap order
const selLetters=[];
const selSources=[];
S.selectionOrder.forEach(e=>{
  if(e.type==='c'&&S.challSelected[e.idx]){selLetters.push(S.challengers[e.idx]);selSources.push('c')}
  if(e.type==='h'&&S.handSelected[e.idx]){selLetters.push(S.hand[e.idx]);selSources.push('h')}
});

let wordStatus='';
let scorePreview='';
if(selLetters.length>=2){
  const res=calcScore(selLetters,selSources);
  const hasChall=selSources.some(s=>s==='c');
  if(res.isWord) wordStatus=`<span class="word-status valid">WORD x2 ✨</span>`;
  else if(hasChall) wordStatus=`<span class="word-status" style="background:rgba(255,107,107,.18);color:var(--coral)">needs real word for challengers</span>`;
  else wordStatus=`<span class="word-status invalid">no word · half pts</span>`;
  scorePreview=`<span style="font-size:.7rem;color:var(--text2)">${res.pts} × ${res.mult} = ${res.total}</span>`;
}

const challDone=S.challUsed.filter(x=>x).length;
const challTotal=S.challengers.length;
const challPct=challTotal?Math.round(challDone/challTotal*100):0;

g.innerHTML=`
<div class="header">
  <div class="header-left">
    <div class="ante-label">Round ${S.round}</div>
  </div>
  <div class="money">$${S.money}</div>
</div>
<div class="score-bar">
  <div class="score-fill" style="width:${pct}%"></div>
  <div class="score-text">Score: ${S.score} / ${S.target}</div>
</div>
<div class="chall-bar">
  <div class="chall-fill" style="width:${challPct}%"></div>
  <div class="chall-text">Challengers ${challDone} / ${challTotal}</div>
</div>

<div class="challenger-box">
  ${S.challengers.map((c,i)=>{
    if(S.challUsed[i]) return `<div class="tile tile-challenger used" style="opacity:.3;pointer-events:none"><span class="letter">${c}</span><span class="points">✓</span></div>`;
    return `<div class="tile tile-challenger${S.challSelected[i]?' selected':''}" onclick="toggleChall(${i})"><span class="letter">${c}</span><span class="points">${LETTER_VALS[c]*2}</span></div>`;
  }).join('')}
</div>

${S.jokers.length?`
<div class="section-label">Jokers</div>
<div class="joker-row">${S.jokers.map(j=>`<div class="joker-chip">${j.name}</div>`).join('')}</div>
`:''}

<div class="word-preview">
  ${selLetters.length?`
    <div class="word-letters">${selLetters.map((l,i)=>`<span class="word-letter ${selSources[i]==='c'?'challenger':'hand'}">${l}</span>`).join('')}</div>
    <div>${wordStatus} ${scorePreview}</div>
  `:`<div class="word-empty">Tap tiles to build a play</div>`}
</div>

<div class="section-label">Your Hand</div>
<div class="hand-area">
  ${S.hand.map((l,i)=>`
    <div class="tile tile-hand${S.handSelected[i]?' selected':''}" onclick="toggleHand(${i})">
      <span class="letter">${l}</span>
      <span class="points">${LETTER_VALS[l]}</span>
    </div>
  `).join('')}
</div>

${S.playLog.length?`
<div class="play-log">
  <div class="play-log-title">Plays</div>
  ${S.playLog.map(e=>`
    <div class="log-entry">
      <div><span class="log-word">${e.display}</span><span class="log-badge ${e.isWord?'word':'noword'}">${e.isWord?'WORD x2':'no word'}</span></div>
      <div class="log-score">+${e.total}</div>
    </div>
  `).join('')}
</div>
`:''}
`;

// Action buttons (fixed)
let ab=document.querySelector('.actions');
if(!ab){ab=document.createElement('div');ab.className='actions';document.body.appendChild(ab)}
ab.classList.remove('hidden');

const anySelected=selLetters.length>=2;
const anyHandSel=S.handSelected.some(x=>x);
ab.innerHTML=`
<div class="stats-row">
  <div class="stat"><span class="stat-icon">✋</span> Hands: <span class="stat-val">${S.handsLeft}</span></div>
  <div class="stat"><span class="stat-icon">🗑</span> Discards: <span class="stat-val">${S.discardsLeft}</span></div>
</div>
<div class="btn-row">
  <button class="btn-submit" ${!anySelected?'disabled':''} onclick="playHand()">Play</button>
  <button class="btn-discard" ${(!anyHandSel||S.discardsLeft<=0)?'disabled':''} onclick="discardSelected()">Discard</button>
</div>
`;
}

function hideActions(){
const ab=document.querySelector('.actions');
if(ab) ab.classList.add('hidden');
}

function toggleHand(i){
  if(S.handSelected[i]){
    S.handSelected[i]=false;
    S.selectionOrder=S.selectionOrder.filter(e=>!(e.type==='h'&&e.idx===i));
  } else {
    S.handSelected[i]=true;
    S.selectionOrder.push({type:'h',idx:i});
  }
  renderGame();
}
function toggleChall(i){
  if(S.challUsed[i]) return;
  if(S.challSelected[i]){
    S.challSelected[i]=false;
    S.selectionOrder=S.selectionOrder.filter(e=>!(e.type==='c'&&e.idx===i));
  } else {
    S.challSelected[i]=true;
    S.selectionOrder.push({type:'c',idx:i});
  }
  renderGame();
}

// === PLAY ===
function playHand(){
// Gather selected letters in tap order
const letters=[];
const sources=[];
S.selectionOrder.forEach(e=>{
  if(e.type==='c'&&S.challSelected[e.idx]){letters.push(S.challengers[e.idx]);sources.push('c')}
  if(e.type==='h'&&S.handSelected[e.idx]){letters.push(S.hand[e.idx]);sources.push('h')}
});

if(letters.length<2){toast('Select at least 2 tiles!');return}

// If any challenger tiles are in this play, it must be a real word
const hasChallenger=sources.some(s=>s==='c');
const word=letters.join('').toLowerCase();
const isRealWord=DICT.has(word);
if(hasChallenger&&!isRealWord){toast('Challenger letters can only be used in a real word!');return}

const res=calcScore(letters,sources);
S.score+=res.total;
S.handsLeft--;
S.handsPlayed++;

// Mark selected challengers as used
S.challSelected.forEach((s,i)=>{if(s) S.challUsed[i]=true});

const wordStr=letters.join('');
const displayLetters=letters.map((l,i)=>sources[i]==='c'?`<span class="log-chall">${l}</span>`:l).join('');
S.playLog.push({display:displayLetters,isWord:res.isWord,pts:res.pts,mult:res.mult,total:res.total});
const wordNote=res.isWord?` (WORD x2!)`:' (no word bonus)';
toast(`${wordStr}: ${res.pts}×${res.mult} = +${res.total}${wordNote}`,2500);

// Check win: need score AND all challengers used
const allChallDone=S.challUsed.every(x=>x);
if(S.score>=S.target&&allChallDone){
  setTimeout(()=>roundWin(),600);
  return;
}

if(S.handsLeft<=0){
  setTimeout(()=>gameOver(),600);
  return;
}

// Remove played hand tiles, draw replacements
const usedIdx=[];
S.handSelected.forEach((s,i)=>{if(s) usedIdx.push(i)});
usedIdx.forEach(i=>{
  const pool=[...FREQ];
  S.hand[i]=pool[Math.floor(Math.random()*pool.length)];
});
S.handSelected=new Array(8).fill(false);
S.challSelected=new Array(S.challengers.length).fill(false);
S.selectionOrder=[];
renderGame();
}

function discardSelected(){
if(S.discardsLeft<=0) return;
const any=S.handSelected.some(x=>x);
if(!any){toast('Select hand tiles to discard');return}

let count=0;
S.handSelected.forEach((s,i)=>{
  if(s){
    const pool=[...FREQ];
    S.hand[i]=pool[Math.floor(Math.random()*pool.length)];
    count++;
  }
});
S.discardsLeft--;
S.handSelected=new Array(8).fill(false);
S.challSelected=new Array(S.challengers.length).fill(false);
S.selectionOrder=[];
toast(`Discarded ${count} tile${count>1?'s':''}`);
renderGame();
}

// === ROUND WIN ===
function roundWin(){
const reward=3+Math.floor(S.round/3);
S.money+=reward;
toast(`Round ${S.round} cleared! +$${reward}`,2000);
setTimeout(()=>showShop(),500);
}

// === SHOP ===
function showShop(){
hideActions();
// Generate shop offerings
const ownedIds=S.jokers.map(j=>j.id);
const available=ALL_JOKERS.filter(j=>!ownedIds.includes(j.id));
S.shopJokers=pick(available,Math.min(3,available.length)).map(j=>({...j,cost:rand(3,6)}));
S.shopLetters=[];
for(let i=0;i<4;i++){
  const l=FREQ[Math.floor(Math.random()*FREQ.length)];
  S.shopLetters.push({letter:l,cost:Math.max(2,Math.min(5,LETTER_VALS[l]))});
}
renderShop();
showScreen('shop');
}

function renderShop(){
const sh=document.getElementById('shop');
const nextRound=S.round+1;
const isGameWin=S.round>=15;

sh.innerHTML=`
<div class="shop-header">
  <div class="shop-title">Shop</div>
  <div class="shop-money">$${S.money}</div>
  <div class="shop-next">${isGameWin?'Victory ahead!':
    `Next: Round ${nextRound} · ${nextRound} challengers · Target: ${getTarget(nextRound)}`}</div>
</div>

<div class="shop-section">
  <div class="shop-section-title">Jokers${S.jokers.length>=5?' (Full!)':''}</div>
  <div class="shop-jokers">
    ${S.shopJokers.map((j,i)=>`
      <div class="shop-joker">
        <div class="shop-joker-name">${j.name}</div>
        <div class="shop-joker-desc">${j.desc}</div>
        <div class="shop-joker-cost">$${j.cost}</div>
        <button ${(S.money<j.cost||S.jokers.length>=5)?'disabled':''} onclick="buyJoker(${i})">Buy</button>
      </div>
    `).join('')}
    ${S.shopJokers.length===0?'<div style="color:var(--text2);font-size:.8rem">All jokers owned!</div>':''}
  </div>
</div>

<div class="shop-section">
  <div class="shop-section-title">Letters (add to deck)</div>
  <div class="shop-letters">
    ${S.shopLetters.map((sl,i)=>`
      <div class="shop-letter-card">
        <div class="tile tile-hand" style="pointer-events:none">
          <span class="letter">${sl.letter}</span>
          <span class="points">${LETTER_VALS[sl.letter]}</span>
        </div>
        <div class="cost">$${sl.cost}</div>
        <button ${S.money<sl.cost?'disabled':''} onclick="buyLetter(${i})">Buy</button>
      </div>
    `).join('')}
  </div>
</div>

${S.jokers.length?`
<div class="shop-section">
  <div class="shop-section-title">Owned Jokers</div>
  <div class="owned-jokers">${S.jokers.map(j=>`<div class="joker-chip">${j.name}</div>`).join('')}</div>
</div>
`:''}

<div class="shop-section">
  <div class="shop-section-title">Your Deck (${S.deck.length} tiles)</div>
  <button class="deck-toggle" onclick="toggleShopDeck()">Show / Hide Deck</button>
  <div id="shopDeck" class="deck-grid hidden">${renderDeckTiles()}</div>
</div>

<button class="btn-next-round" onclick="nextRound()">${isGameWin?'Claim Victory →':'Next Round →'}</button>
`;
}

function toggleShopDeck(){
  const el=document.getElementById('shopDeck');
  if(el) el.classList.toggle('hidden');
}

function buyJoker(i){
const j=S.shopJokers[i];
if(S.money<j.cost||S.jokers.length>=5) return;
S.money-=j.cost;
S.jokers.push(j);
S.shopJokers.splice(i,1);
toast(`Bought ${j.name}!`);
renderShop();
}

function buyLetter(i){
const sl=S.shopLetters[i];
if(S.money<sl.cost) return;
S.money-=sl.cost;
S.deck.push(sl.letter);
S.shopLetters.splice(i,1);
toast(`Added ${sl.letter} to deck!`);
renderShop();
}

function nextRound(){
if(S.round>=15){
  showScreen('win');
  hideActions();
  document.getElementById('win').innerHTML=`
    <div class="end-title" style="color:var(--gold)">Victory! 🏆</div>
    <div class="end-sub">You conquered all 15 Rounds!<br>The WordForge is yours.</div>
    <div class="end-stat">Final Bank: $${S.money} · ${S.jokers.length} Jokers</div>
    <button class="btn-retry" style="background:linear-gradient(135deg,var(--gold),var(--amber))" onclick="startGame()">Play Again</button>
  `;
  return;
}
S.round++;
startRound();
}

// === GAME OVER ===
function gameOver(){
hideActions();
showScreen('gameover');
document.getElementById('gameover').innerHTML=`
  <div class="end-title" style="color:var(--coral)">Game Over</div>
  <div class="end-sub">You ran out of hands!</div>
  <div class="end-stat">Round ${S.round}<br>Score: ${S.score} / ${S.target}<br>Challengers: ${S.challUsed.filter(x=>x).length}/${S.challengers.length} used</div>
  <button class="btn-retry" onclick="startGame()">Try Again</button>
`;
}

// === DECK DISPLAY HELPER ===
function renderDeckTiles(){
  const sorted=[...S.deck].sort();
  return sorted.map(l=>`
    <div class="tile tile-hand" style="pointer-events:none">
      <span class="letter">${l}</span>
      <span class="points">${LETTER_VALS[l]}</span>
    </div>
  `).join('');
}

// === PREGAME ===
function showPregame(){
  hideActions();
  showScreen('pregame');
  const pg=document.getElementById('pregame');
  pg.innerHTML=`
    <div class="pregame-title">Your Letter Deck</div>
    <div class="pregame-sub">${S.deck.length} tiles · Round ${S.round} · Target: ${getTarget(S.round)}</div>
    <div class="deck-grid">${renderDeckTiles()}</div>
    <button class="btn-play" onclick="startRound()">Begin Round 1</button>
  `;
}

// === START ===
function startGame(){
initState();
buildDeck();
showPregame();
}

function startRound(){
S.score=0;
S.target=getTarget(S.round);
S.handsLeft=3+S.round;
S.discardsLeft=3;
S.handsPlayed=0;
S.playLog=[];
const cc=challengerCount(S.round);
S.challengers=genChallengers(cc);
S.challSelected=new Array(cc).fill(false);
S.challUsed=new Array(cc).fill(false);
S.selectionOrder=[];
drawHand();
showScreen('game');
renderGame();
}

// Init
initState();
</script>
</body>
</html>
