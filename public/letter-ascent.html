<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Letter Ascent</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1729;
    --bg2: #162038;
    --tile: #1e2d4d;
    --tile-hover: #263a5e;
    --tile-selected: #f76c5e;
    --tile-path: #e85d4f;
    --tile-text: #e8ecf4;
    --tile-text-selected: #fff;
    --accent: #f76c5e;
    --accent2: #4ecdc4;
    --accent3: #ffe66d;
    --muted: #4a5980;
    --glass: rgba(30, 45, 77, 0.7);
    --valid: #4ecdc4;
    --invalid: #f76c5e;
    --scroll-indicator: #ffe66d;
    --font: 'Fredoka', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: var(--font);
    color: var(--tile-text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* --- HEADER --- */
  .header {
    width: 100%;
    max-width: 420px;
    padding: 8px 16px 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stats {
    display: flex;
    gap: 16px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .stat { display: flex; align-items: center; gap: 4px; }
  .stat-label { color: var(--tile-text); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-val { color: var(--accent2); font-family: var(--mono); font-weight: 700; }

  /* --- WORD DISPLAY --- */
  .word-display {
    width: 100%;
    max-width: 420px;
    padding: 2px 16px;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .word-display .current-word {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s;
    min-height: 1.5em;
  }
  .word-display .current-word.valid { color: var(--valid); }
  .word-display .current-word.invalid { color: var(--muted); }
  .word-display .current-word.checking { color: var(--accent3); }

  /* --- BOARD --- */
  .board-container {
    position: relative;
    width: 100%;
    max-width: 420px;
    padding: 0 16px;
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: hidden;
  }
  .board-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .board-wrapper.scrolling {
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: 100%;
  }
  /* During scroll animation, the board has more rows than visible — overflow hidden on container clips it */

  .tile.consumed {
    opacity: 0.15;
    transform: scale(0.85);
    transition: all 0.3s ease;
  }
  .tile.advance-zone {
    opacity: 0.55;
  }
  .tile.advance-zone.selected, .tile.advance-zone.path {
    opacity: 1;
  }
  .tile.advance-cutline {
    box-shadow: 0 -3px 0 0 rgba(255, 230, 109, 0.4);
  }

  .tile {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.2rem, 5vw, 2rem);
    font-weight: 700;
    text-transform: uppercase;
    background: var(--tile);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    border: 2px solid transparent;
    min-height: 0;
  }
  .tile:active { transform: scale(0.93); }
  .tile.selected {
    background: var(--tile-selected);
    color: var(--tile-text-selected);
    border-color: rgba(255,255,255,0.3);
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(247, 108, 94, 0.4);
    z-index: 2;
  }
  .tile.path {
    background: var(--tile-path);
    color: var(--tile-text-selected);
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 0 12px rgba(247, 108, 94, 0.25);
    z-index: 1;
  }
  .tile.must-start {
    border-color: rgba(255, 230, 109, 0.45);
    box-shadow: 0 0 7px rgba(255, 230, 109, 0.15);
  }
  .tile.locked {
    opacity: 0.25;
    pointer-events: none;
  }
  .tile.new-tile {
    animation: tileAppear 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes tileAppear {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .tile .order-badge {
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.6);
    font-family: var(--mono);
  }

  /* Scroll indicator arrows on row 0 */
  .row-indicator {
    position: absolute;
    left: -2px;
    right: -2px;
    top: 0;
    height: calc((100% / 8) - 2px);
    border: 2px dashed var(--scroll-indicator);
    border-radius: 14px;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .row-indicator.active { opacity: 0.8; }

  /* --- CONTROLS --- */
  .controls {
    width: 100%;
    max-width: 420px;
    padding: 6px 16px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-family: var(--font);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:active { transform: scale(0.96); }
  .btn-submit {
    background: var(--accent2);
    color: var(--bg);
  }
  .btn-submit:disabled {
    background: var(--muted);
    opacity: 0.5;
    cursor: default;
  }
  .btn-clear {
    background: var(--glass);
    color: var(--tile-text);
    border: 1px solid var(--muted);
    flex: 0.5;
  }
  .btn-undo {
    background: var(--glass);
    color: var(--tile-text);
    border: 1px solid var(--muted);
    flex: 0.5;
  }

  /* --- GAME OVER OVERLAY --- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 41, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(8px);
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  .overlay h2 {
    font-size: 2rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .overlay .final-score { font-size: 3rem; font-weight: 700; color: var(--accent3); font-family: var(--mono); }
  .overlay .final-words { color: var(--muted); margin: 12px 0 24px; font-size: 0.9rem; }
  .overlay .word-log {
    max-height: 160px;
    overflow-y: auto;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 340px;
  }
  .overlay .word-tag {
    background: var(--glass);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-family: var(--mono);
    color: var(--accent2);
  }
  .btn-restart {
    background: linear-gradient(135deg, var(--accent), #e04a3a);
    color: #fff;
    padding: 16px 48px;
    border: none;
    border-radius: 14px;
    font-family: var(--font);
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* --- TOAST --- */
  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--glass);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 8px 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.9rem;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 50;
    backdrop-filter: blur(8px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }

  /* --- DANGER ZONE --- */
  .tile.danger {
    background: rgba(180, 40, 30, 0.35);
    border-color: rgba(255, 80, 60, 0.3);
    color: rgba(232, 236, 244, 0.4);
    pointer-events: none;
  }
  .tile.danger-edge {
    box-shadow: 0 3px 0 0 rgba(255, 80, 60, 0.6);
  }
  .board-container.warning {
    animation: warningPulse 1s ease-in-out infinite;
  }
  @keyframes warningPulse {
    0%, 100% { box-shadow: inset 0 0 0 0 transparent; }
    50% { box-shadow: inset 0 0 30px rgba(255, 60, 40, 0.15); }
  }
</style>
</head>

</div>

<div class="controls">

</div>

<div class="overlay" id="overlay">

  <div class="word-log" id="wordLog"></div>

</div>

<div class="toast" id="toast"></div>

async function loadDict(){
const b=Uint8Array.from(atob(DICT_GZ),c=>c.charCodeAt(0));
const ds=new DecompressionStream('gzip');
const wr=ds.writable.getWriter();
wr.write(b);wr.close();
const rd=ds.readable.getReader();
const chunks=[];
while(true){const{done,value}=await rd.read();if(done)break;chunks.push(value)}
const text=new TextDecoder().decode(await new Blob(chunks).arrayBuffer());
text.split('\n').forEach(w=>{const t=w.trim();if(t.length>=2)DICTIONARY.add(t)});
// Build prefix set
for(const word of DICTIONARY){
for(let i=1;i<=word.length;i++) PREFIX_SET.add(word.substring(0,i));
}
DICT_READY=true;
bootGame();
}

// ============================================================
// LETTER FREQUENCY — weighted for better word-forming
// ============================================================
const LETTER_WEIGHTS = {
  'a':8,'b':2,'c':3,'d':4,'e':12,'f':2,'g':2,'h':4,'i':7,'j':1,'k':1,'l':4,'m':3,
  'n':6,'o':7,'p':2,'q':0.3,'r':6,'s':6,'t':9,'u':3,'v':1,'w':2,'x':0.5,'y':2,'z':0.5
};
const WEIGHTED_LETTERS = [];
for (const [letter, weight] of Object.entries(LETTER_WEIGHTS)) {
  const count = Math.round(weight * 10);
  for (let i = 0; i < count; i++) WEIGHTED_LETTERS.push(letter);
}

function randomLetter() {
  return WEIGHTED_LETTERS[Math.floor(Math.random() * WEIGHTED_LETTERS.length)];
}

// ============================================================
// GAME STATE
// ============================================================
const COLS = 5;
const ROWS = 8;

let grid = [];           // grid[row][col] = letter
let selected = [];        // [{row, col}, ...]
let score = 0;
let wordCount = 0;
let depth = 0;            // total rows scrolled
let wordsFound = [];
let lockedRows = 0;       // rows above the "start row" — locked out
let gameOver = false;
let mustStartRow = 0;     // the row player must start from
const TEST_MODE = false;  // set to true to bypass dictionary checks

// Danger zone
let dangerRow = ROWS;       // row index where danger starts (ROWS = off-board, 0 = game over)
let dangerTimer = null;
const DANGER_BASE_INTERVAL = 8000; // ms between danger rises
const DANGER_MIN_INTERVAL = 3000;  // fastest it can get

// ============================================================
// INIT
// ============================================================
function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) row.push(randomLetter());
    grid.push(row);
  }
}

function renderBoard() {
  const board = document.getElementById('board');
  const wrapper = document.getElementById('boardWrapper');
  const container = document.querySelector('.board-container');

  const containerH = container.clientHeight;
  const gap = 6;
  const tileH = (containerH - gap * (ROWS - 1)) / ROWS;

  board.style.gridTemplateRows = `repeat(${ROWS}, ${tileH}px)`;
  board.innerHTML = '';
  wrapper.classList.remove('scrolling');
  wrapper.style.transform = 'translateY(0)';

  // Determine advance zone: rows 0 to maxRow-1 will scroll off
  const maxSelectedRow = selected.length > 0 ? Math.max(...selected.map(s => s.row)) : -1;

  // Render rows in reverse order (highest row at top, row 0 at bottom)
  for (let r = ROWS - 1; r >= 0; r--) {
    for (let c = 0; c < COLS; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.textContent = grid[r][c];
      tile.dataset.row = r;
      tile.dataset.col = c;

      if (r < mustStartRow) tile.classList.add('locked');
      if (r === mustStartRow && selected.length === 0) tile.classList.add('must-start');

      // Highlight rows that will scroll off on submit
      if (selected.length > 0 && maxSelectedRow > 0 && r < maxSelectedRow) {
        tile.classList.add('advance-zone');
        if (r === maxSelectedRow - 1) tile.classList.add('advance-cutline');
      }

      const idx = selected.findIndex(s => s.row === r && s.col === c);
      if (idx === selected.length - 1 && idx >= 0) {
        tile.classList.add('selected');
        const badge = document.createElement('span');
        badge.className = 'order-badge';
        badge.textContent = idx + 1;
        tile.appendChild(badge);
      } else if (idx >= 0) {
        tile.classList.add('path');
        const badge = document.createElement('span');
        badge.className = 'order-badge';
        badge.textContent = idx + 1;
        tile.appendChild(badge);
      }

      // Danger zone
      if (r >= dangerRow) {
        tile.classList.add('danger');
        if (r === dangerRow) tile.classList.add('danger-edge');
      }

      tile.addEventListener('pointerdown', (e) => { e.preventDefault(); onTilePointer(r, c); });

      board.appendChild(tile);
    }
  }
  updateUI();
}

let isAnimating = false;

function animateScroll(scrollAmount, newRows, oldDangerRow) {
  if (scrollAmount === 0) {
    renderBoard();
    setTimeout(() => checkGameOver(), 100);
    return;
  }

  isAnimating = true;
  const board = document.getElementById('board');
  const wrapper = document.getElementById('boardWrapper');
  const container = document.querySelector('.board-container');

  const containerH = container.clientHeight;
  const gap = 6;
  const tileH = (containerH - gap * (ROWS - 1)) / ROWS;
  const totalRows = ROWS + scrollAmount;

  const oldGrid = grid.map(row => [...row]);

  for (let i = 0; i < scrollAmount; i++) {
    grid.shift();
    grid.push(newRows[i]);
  }

  const extendedGrid = [...oldGrid, ...newRows];

  board.style.gridTemplateRows = `repeat(${totalRows}, ${tileH}px)`;
  board.innerHTML = '';
  wrapper.classList.remove('scrolling');
  // Start offset so new rows are hidden above, old rows visible
  const scrollPx = scrollAmount * (tileH + gap);
  wrapper.style.transform = `translateY(-${scrollPx}px)`;

  // Use old danger row position for the extended grid during animation
  const animDanger = oldDangerRow !== undefined ? oldDangerRow : dangerRow;

  // Render reversed: highest extended row at top, row 0 at bottom
  for (let r = totalRows - 1; r >= 0; r--) {
    for (let c = 0; c < COLS; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.textContent = extendedGrid[r][c];

      if (r < scrollAmount) {
        tile.classList.add('consumed');
        tile.classList.add('advance-zone');
      }

      // Danger zone on extended grid
      if (r >= animDanger) {
        tile.classList.add('danger');
        if (r === animDanger) tile.classList.add('danger-edge');
      }

      if (r >= ROWS) {
        tile.classList.add('new-tile');
        tile.style.animationDelay = `${(r - ROWS) * 0.04 + c * 0.02}s`;
      }

      board.appendChild(tile);
    }
  }

  // Trigger the scroll animation downward (reveals new rows at top)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      wrapper.classList.add('scrolling');
      wrapper.style.transform = 'translateY(0)';
    });
  });

  // After animation completes, snap to the clean new board
  const onEnd = () => {
    wrapper.removeEventListener('transitionend', onEnd);
    isAnimating = false;
    mustStartRow = 0;
    selected = [];
    renderBoard();
    setTimeout(() => checkGameOver(), 100);
  };
  wrapper.addEventListener('transitionend', onEnd);

  // Fallback in case transitionend doesn't fire
  setTimeout(() => {
    if (isAnimating) {
      isAnimating = false;
      mustStartRow = 0;
      selected = [];
      renderBoard();
      setTimeout(() => checkGameOver(), 100);
    }
  }, 800);
}

function updateUI() {
  const word = getSelectedWord();
  const wordEl = document.getElementById('currentWord');
  wordEl.textContent = word || '\u00A0';

  const isValid = word.length >= 3 && (TEST_MODE || DICTIONARY.has(word.toLowerCase()));
  const alreadyUsed = !TEST_MODE && wordsFound.includes(word.toLowerCase());

  wordEl.className = 'current-word';
  if (word.length === 0) {
    wordEl.classList.add('invalid');
  } else if (alreadyUsed) {
    wordEl.classList.add('invalid');
  } else if (isValid) {
    wordEl.classList.add('valid');
  } else {
    wordEl.classList.add('invalid');
  }

  document.getElementById('btnSubmit').disabled = !(isValid && !alreadyUsed);
  document.getElementById('score').textContent = score;
  document.getElementById('wordCount').textContent = wordCount;
  document.getElementById('depth').textContent = depth;
}

function getSelectedWord() {
  return selected.map(s => grid[s.row][s.col]).join('');
}

// ============================================================
// TILE SELECTION
// ============================================================
function isAdjacent(a, b) {
  return Math.abs(a.row - b.row) <= 1 && Math.abs(a.col - b.col) <= 1 && !(a.row === b.row && a.col === b.col);
}

function onTilePointer(row, col) {
  if (gameOver || isAnimating) return;
  if (row < mustStartRow) return; // locked
  if (row >= dangerRow) return;   // in danger zone

  // If tapping the second-to-last tile, undo last
  if (selected.length >= 2) {
    const prev = selected[selected.length - 2];
    if (prev.row === row && prev.col === col) {
      undoLast();
      return;
    }
  }

  // Already selected? ignore if it's the last one
  const existingIdx = selected.findIndex(s => s.row === row && s.col === col);
  if (existingIdx >= 0) return;

  // First tile must be on mustStartRow
  if (selected.length === 0 && row !== mustStartRow) {
    showStatus('Start from the highlighted row', true);
    return;
  }

  // Must be adjacent to last selected
  if (selected.length > 0) {
    const last = selected[selected.length - 1];
    if (!isAdjacent(last, { row, col })) return;
  }

  selected.push({ row, col });
  renderBoard();
}

function undoLast() {
  if (selected.length > 0) {
    selected.pop();
    renderBoard();
  }
}

function clearSelection() {
  selected = [];
  renderBoard();
}

// ============================================================
// SUBMIT WORD
// ============================================================
function submitWord() {
  if (isAnimating) return;
  const word = getSelectedWord().toLowerCase();
  if (word.length < 3) return;
  if (!TEST_MODE && (!DICTIONARY.has(word) || wordsFound.includes(word))) return;

  // Score: length bonus + depth bonus
  const lengthScore = word.length * word.length * 10;
  const depthBonus = Math.floor(depth / 5) * 5;
  const gained = lengthScore + depthBonus;
  score += gained;
  wordCount++;
  wordsFound.push(word);

  showToast(`+${gained}  ${word.toUpperCase()}`);

  // Find the lowest row in the selection
  const maxRow = Math.max(...selected.map(s => s.row));

  // Advance: scroll up so that maxRow becomes the new top (row 0)
  const scrollAmount = maxRow; // number of rows to remove from top

  depth += scrollAmount;

  // Generate new rows
  const newRows = [];
  for (let i = 0; i < scrollAmount; i++) {
    const row = [];
    for (let c = 0; c < COLS; c++) row.push(randomLetter());
    newRows.push(row);
  }

  // Push back danger and restart timer
  const oldDangerRow = dangerRow;
  pushBackDanger(scrollAmount, gained);
  startDangerTimer();

  // Animate the scroll (pass old danger row for visual continuity)
  animateScroll(scrollAmount, newRows, oldDangerRow);
}

// ============================================================
// GAME OVER CHECK
// ============================================================
function checkGameOver() {
  if (TEST_MODE) return; // no game over in test mode
  const found = canFormAnyWord();
  if (!found) {
    endGame();
  }
}

function canFormAnyWord() {
  // DFS from each cell in mustStartRow
  for (let c = 0; c < COLS; c++) {
    const visited = new Set();
    if (dfsSearch(mustStartRow, c, '', visited)) return true;
  }
  return false;
}

function dfsSearch(row, col, prefix, visited) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return false;
  if (row >= dangerRow) return false; // in danger zone
  const key = `${row},${col}`;
  if (visited.has(key)) return false;

  const newPrefix = prefix + grid[row][col];

  // Check if any word in dictionary starts with this prefix
  let hasPrefix = false;
  for (const word of DICTIONARY) {
    if (word.startsWith(newPrefix.toLowerCase())) { hasPrefix = true; break; }
  }
  if (!hasPrefix) return false;

  if (newPrefix.length >= 3 && DICTIONARY.has(newPrefix.toLowerCase()) && !wordsFound.includes(newPrefix.toLowerCase())) {
    return true;
  }

  if (newPrefix.length >= 7) return false; // cap search depth

  visited.add(key);

  // Explore all adjacent cells (8 directions)
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      if (dfsSearch(row + dr, col + dc, newPrefix, new Set(visited))) return true;
    }
  }

  return false;
}

// ============================================================
// END GAME
// ============================================================
function endGame() {
  gameOver = true;
  stopDangerTimer();
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalWords').textContent = `${wordCount} word${wordCount !== 1 ? 's' : ''} found · Height ${depth}`;

  const logEl = document.getElementById('wordLog');
  logEl.innerHTML = '';
  wordsFound.forEach(w => {
    const tag = document.createElement('span');
    tag.className = 'word-tag';
    tag.textContent = w;
    logEl.appendChild(tag);
  });

  document.getElementById('overlay').classList.add('active');
}

// ============================================================
// DANGER ZONE
// ============================================================
function getDangerInterval() {
  // Gets faster as depth increases
  const speedup = Math.min(depth * 80, DANGER_BASE_INTERVAL - DANGER_MIN_INTERVAL);
  return DANGER_BASE_INTERVAL - speedup;
}

function startDangerTimer() {
  stopDangerTimer();
  if (gameOver) return;
  dangerTimer = setTimeout(() => {
    riseDanger();
    startDangerTimer(); // schedule next tick
  }, getDangerInterval());
}

function stopDangerTimer() {
  if (dangerTimer) {
    clearTimeout(dangerTimer);
    dangerTimer = null;
  }
}

function riseDanger() {
  if (gameOver || isAnimating) return;
  dangerRow--;
  if (dangerRow <= mustStartRow) {
    // Danger reached the playable area — game over
    dangerRow = mustStartRow;
    renderBoard();
    updateDangerUI();
    endGame();
    return;
  }
  // Clear any selection on tiles that are now in the danger zone
  selected = selected.filter(s => s.row < dangerRow);
  renderBoard();
  updateDangerUI();
}

function pushBackDanger(scrollAmount, gained) {
  // Push danger back: depth-based scroll + score-based bonus
  // Net from scroll: (scrollAmount - 1) rows
  // Score bonus: every 150 points pushes back an extra row
  const scrollPush = Math.max(0, scrollAmount - 1);
  const scorePush = Math.floor(gained / 150);
  dangerRow = Math.min(ROWS, dangerRow + scrollPush + scorePush);
  updateDangerUI();
}

function updateDangerUI() {
  const container = document.getElementById('boardContainer');
  const isHot = dangerRow <= mustStartRow + 3;
  container.classList.toggle('warning', isHot);
}

function restartGame() {
  score = 0;
  wordCount = 0;
  depth = 0;
  wordsFound = [];
  mustStartRow = 0;
  selected = [];
  gameOver = false;
  dangerRow = ROWS;
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('boardContainer').classList.remove('warning');
  initGrid();
  renderBoard();
  updateDangerUI();
  startDangerTimer();
}

// ============================================================
// UI HELPERS
// ============================================================
function showStatus(msg, isError = false) {
  if (isError) showToast(msg);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1200);
}

// ============================================================
// TOUCH DRAG SYSTEM
// ============================================================
let isDragging = false;

function getTileFromPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  if (!el) return null;
  const tile = el.closest('.tile');
  if (!tile) return null;
  const row = parseInt(tile.dataset.row);
  const col = parseInt(tile.dataset.col);
  if (isNaN(row) || isNaN(col)) return null;
  return { row, col };
}

document.addEventListener('pointerdown', (e) => {
  if (!e.target.closest('.board')) return;
  isDragging = true;
});

document.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  e.preventDefault();
  const hit = getTileFromPoint(e.clientX, e.clientY);
  if (hit) onTilePointer(hit.row, hit.col);
}, { passive: false });

document.addEventListener('pointerup', () => { isDragging = false; });
document.addEventListener('pointercancel', () => { isDragging = false; });

// Prevent scrolling on touch over the board
document.addEventListener('touchmove', (e) => {
  if (e.target.closest('.board') || isDragging) e.preventDefault();
}, { passive: false });

// ============================================================
// BOOT
// ============================================================

// ============================================================
// BOOT — deferred until dictionary loads
// ============================================================
function bootGame(){
initGrid();

// Override canFormAnyWord to use fast prefix version
window.canFormAnyWord = function() {
  for (let c = 0; c < COLS; c++) {
    const visited = new Set();
    if (dfsSearchFast(mustStartRow, c, '', visited)) return true;
  }
  return false;
};

renderBoard();
updateDangerUI();
startDangerTimer();

// Remove loading overlay
const lo = document.getElementById('loadingOverlay');
if (lo) lo.remove();
}

function dfsSearchFast(row, col, prefix, visited) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return false;
  if (row >= dangerRow) return false;
  const key = `${row},${col}`;
  if (visited.has(key)) return false;

  const newPrefix = prefix + grid[row][col];
  const lower = newPrefix.toLowerCase();

  if (!PREFIX_SET.has(lower)) return false;

  if (lower.length >= 3 && DICTIONARY.has(lower) && !wordsFound.includes(lower)) {
    return true;
  }

  if (lower.length >= 7) return false;

  visited.add(key);

  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      if (dfsSearchFast(row + dr, col + dc, newPrefix, new Set(visited))) return true;
    }
  }

  return false;
}

// Show loading state and start dict load
loadDict();
</script>
